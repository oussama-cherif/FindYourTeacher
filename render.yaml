services:
  - type: web
    name: findyourteacher-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: FLOUCI_APP_TOKEN
        sync: false
      - key: FLOUCI_APP_SECRET
        sync: false
      - key: FLOUCI_BASE_URL
        value: https://developers.flouci.com
